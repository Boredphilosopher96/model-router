name: Publish to npm

# Publishes @curliness8029/model-router when a GitHub release is published.
# Flow: bump package.json version -> update CHANGELOG.md -> create a release
# tagged vX.Y.Z (gh release create v1.0.1 --notes "...").
#
# AUTH — trusted publishing (OIDC), the recommended zero-secret path:
#   Configure once on npmjs.com -> package -> Settings -> Trusted Publisher:
#     Organization or user: Boredphilosopher96
#     Repository:           model-router
#     Workflow filename:    publish.yml
#     Allowed actions:      "npm publish"
#   After that, NO token or secret is needed: GitHub mints a short-lived
#   OIDC credential per run (that's what `id-token: write` below grants),
#   and npm exchanges it automatically. Provenance is attached by default.
#   Requires npm >= 11.5.1 (Node 24 ships npm 11; we upgrade to be sure).
#
# ALTERNATIVE — granular access token (note: write tokens expire in <= 90
# days, so this path needs recurring rotation):
#   1. Create the token (see docs) and: gh secret set NPM_TOKEN
#   2. Uncomment the two marked blocks below.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for npm trusted publishing + provenance

jobs:
  publish:
    name: Verify & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          # TOKEN AUTH ONLY — uncomment when using NPM_TOKEN instead of
          # trusted publishing:
          # registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest && npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (strict)
        run: bunx tsc --noEmit

      - name: Test
        run: bun test

      - name: Check version matches tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(bun -e 'console.log((await Bun.file("package.json").json()).version)')
          TAG="${{ github.event.release.tag_name }}"
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "package.json version ($PKG_VERSION) does not match release tag ($TAG)"; exit 1
          fi

      - name: Publish
        run: npm publish
        # TOKEN AUTH ONLY — uncomment when using NPM_TOKEN instead of
        # trusted publishing:
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
